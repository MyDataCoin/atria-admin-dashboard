name: CI + Deploy

# Build on every push/PR; deploy the built static site to the Ubuntu server only on
# pushes to the default branch (and manual runs). All connection details are GitHub
# Secrets — nothing sensitive lives in this file.
#
# Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_PASSWORD
# (SSH port defaults to 22; auth is password-based.)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Where the static site lives on the server. The deploy user must be able to write here
# (chown the dir to DEPLOY_USER once, or use a path under its home). Point your web
# server (nginx/Caddy) document root at this directory.
env:
  TARGET_DIR: /opt/atria/dashboard

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Hand the built output to the deploy job so we never rebuild (or ship source).
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    # Never deploy from pull requests (incl. forks) — only direct pushes / manual runs.
    if: github.event_name != 'pull_request'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # Pack the built files (contents of dist/, without the leading dist/ folder).
      - name: Package deployment bundle
        run: tar -czf deploy.tar.gz -C dist .

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          source: "deploy.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Unpack and publish on the server
        uses: appleboy/ssh-action@v1.0.3
        env:
          TARGET_DIR: ${{ env.TARGET_DIR }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          envs: TARGET_DIR
          script: |
            set -euo pipefail

            # Fresh directory each deploy so files removed in git don't linger on the server.
            mkdir -p "$TARGET_DIR"
            find "$TARGET_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            tar -xzf /tmp/deploy.tar.gz -C "$TARGET_DIR"
            rm -f /tmp/deploy.tar.gz

            # Best-effort reload of the web server if it's installed on this host.
            if command -v nginx >/dev/null 2>&1; then
              nginx -t && (systemctl reload nginx 2>/dev/null || sudo systemctl reload nginx 2>/dev/null || true)
            fi

            echo "Deployed to $TARGET_DIR"
            ls -la "$TARGET_DIR"
